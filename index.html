<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEVERSE — Brand Marketing Partner</title>
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="no-referrer">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black:  #050508;
  --white:  #f0ede8;
  --orange: #FF6B2B;
  --orange2: #ff8c52;
  --dim:    rgba(240,237,232,0.08);
  --dim2:   rgba(240,237,232,0.15);
  --border: rgba(240,237,232,0.12);
}

html, body {
  height: 100%; width: 100%;
  background: var(--black);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
}

/* ── 3D 캔버스 배경 ── */
#canvas-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* ── 노이즈 오버레이 ── */
.noise {
  position: fixed; inset: 0; z-index: 1;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  opacity: 0.6;
}

/* ── 그라디언트 ── */
.glow {
  position: fixed; z-index: 1; pointer-events: none;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.18;
}
.glow-1 {
  width: 600px; height: 600px;
  background: var(--orange);
  top: -150px; left: -100px;
  animation: driftA 12s ease-in-out infinite alternate;
}
.glow-2 {
  width: 500px; height: 500px;
  background: #ff2d6b;
  bottom: -100px; right: -80px;
  animation: driftB 15s ease-in-out infinite alternate;
}
.glow-3 {
  width: 400px; height: 400px;
  background: #2b6bff;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  animation: driftC 10s ease-in-out infinite alternate;
  opacity: 0.08;
}

@keyframes driftA { from { transform: translate(0,0) scale(1); } to { transform: translate(60px,40px) scale(1.1); } }
@keyframes driftB { from { transform: translate(0,0) scale(1); } to { transform: translate(-40px,-60px) scale(1.15); } }
@keyframes driftC { from { transform: translate(-50%,-50%) scale(1); } to { transform: translate(-50%,-50%) scale(1.2); } }

/* ── 메인 레이아웃 ── */
.wrapper {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100vh; width: 100%;
  padding: 24px;
}

/* ── 로고 영역 ── */
.brand {
  text-align: center;
  margin-bottom: 48px;
  animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) both;
}
.brand-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(52px, 8vw, 88px);
  letter-spacing: 0.08em;
  line-height: 1;
  background: linear-gradient(135deg, var(--white) 30%, var(--orange) 70%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
}
.brand-logo::after {
  content: 'WEVERSE';
  position: absolute;
  left: 0; top: 0;
  font-family: 'Bebas Neue', sans-serif;
  font-size: inherit;
  letter-spacing: inherit;
  background: linear-gradient(135deg, var(--white) 30%, var(--orange) 70%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: blur(20px);
  opacity: 0.4;
  z-index: -1;
}
.brand-sub {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--orange);
  margin-top: 6px;
  opacity: 0.9;
}

/* ── 로그인 카드 ── */
.card {
  width: 100%;
  max-width: 360px;
  background: rgba(10,10,15,0.7);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px 32px;
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  box-shadow: 0 0 0 1px var(--border), 0 40px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(240,237,232,0.08);
  animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.1s both;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--orange), transparent);
  opacity: 0.6;
}

.card-title {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.05em;
  color: rgba(240,237,232,0.5);
  margin-bottom: 28px;
  text-align: center;
}

/* ── 인풋 ── */
.field {
  margin-bottom: 14px;
  position: relative;
}
.field label {
  display: block;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(240,237,232,0.4);
  margin-bottom: 8px;
  font-family: 'DM Mono', monospace;
}
.field input {
  width: 100%;
  background: rgba(240,237,232,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--white);
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  padding: 13px 16px;
  outline: none;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  letter-spacing: 0.03em;
}
.field input:focus {
  border-color: var(--orange);
  background: rgba(255,107,43,0.06);
  box-shadow: 0 0 0 3px rgba(255,107,43,0.12);
}
.field input::placeholder { color: rgba(240,237,232,0.2); }
.field input[type="password"] { letter-spacing: 0.1em; }

/* ── 오류 메시지 ── */
.error-msg {
  display: none;
  background: rgba(255,45,85,0.1);
  border: 1px solid rgba(255,45,85,0.25);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: #ff6b8a;
  margin-bottom: 16px;
  text-align: center;
  animation: shake 0.4s ease;
}
.error-msg.show { display: block; }

/* ── 로그인 버튼 ── */
.btn-login {
  width: 100%;
  background: var(--orange);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.05em;
  cursor: pointer;
  margin-top: 8px;
  position: relative;
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(255,107,43,0.3);
}
.btn-login::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  pointer-events: none;
}
.btn-login:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 30px rgba(255,107,43,0.45);
}
.btn-login:active { transform: translateY(0); }
.btn-login:disabled {
  opacity: 0.6; cursor: not-allowed;
  transform: none;
}
.btn-login .spinner {
  display: none;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin: 0 auto;
}
.btn-login.loading .spinner { display: block; }
.btn-login.loading .btn-text { display: none; }

/* ── 잠금 표시 ── */
.lockout-msg {
  display: none;
  text-align: center;
  font-size: 11px;
  color: rgba(240,237,232,0.35);
  margin-top: 16px;
  font-family: 'DM Mono', monospace;
}
.lockout-msg.show { display: block; }
.lockout-msg span { color: var(--orange); font-weight: 500; }

/* ── 애니메이션 ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-6px); }
  40%     { transform: translateX(6px); }
  60%     { transform: translateX(-4px); }
  80%     { transform: translateX(4px); }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes scanline {
  0%   { transform: translateY(-100%); }
  100% { transform: translateY(100vh); }
}

/* ── 스캔라인 효과 ── */
.scanline {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  overflow: hidden;
}
.scanline::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(transparent, rgba(255,107,43,0.06), transparent);
  animation: scanline 8s linear infinite;
}

/* ── 하단 ── */
.footer-line {
  position: fixed; bottom: 24px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: rgba(240,237,232,0.15);
  text-transform: uppercase;
  animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.3s both;
}
</style>
</head>
<body>

<canvas id="canvas-bg"></canvas>
<div class="noise"></div>
<div class="scanline"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="glow glow-3"></div>

<div class="wrapper">
  <div class="brand">
    <div class="brand-logo">WEVERSE</div>
    <div class="brand-sub">Brand Marketing Partner</div>
  </div>

  <div class="card">
    <div class="card-title">Secure Access</div>

    <div class="error-msg" id="error-msg">아이디 또는 비밀번호가 올바르지 않습니다</div>

    <div class="field">
      <label>ID</label>
      <input type="text" id="inp-id" placeholder="Enter your ID" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="inp-pw" placeholder="••••••••••">
    </div>

    <button class="btn-login" id="btn-login" onclick="doLogin()">
      <span class="btn-text">Sign In</span>
      <span class="spinner"></span>
    </button>

    <div class="lockout-msg" id="lockout-msg">
      <span id="lockout-sec">30</span>초 후 재시도 가능합니다
    </div>
  </div>
</div>

<div class="footer-line">© 2025 WEVERSE · Brand Intelligence System</div>

<script>
// ── 보안 설정 ──────────────────────────────────────────────
const CORRECT_ID   = 'weverse';
const CORRECT_HASH = 'e78b4f3f32cc3da35110d7ad92456c60dbf71764ee64b94359507ac2aaf8ca31';
const MAX_ATTEMPTS = 5;
const LOCKOUT_SEC  = 30;
const SESSION_KEY  = '_wv_auth';
const SESSION_DUR  = 8 * 60 * 60 * 1000; // 8시간

// ── SHA-256 해시 함수 ────────────────────────────────────
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── 로그인 상태 확인 ─────────────────────────────────────
function checkSession() {
  try {
    const raw = sessionStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    const s = JSON.parse(atob(raw));
    if (Date.now() - s.t > SESSION_DUR) { sessionStorage.removeItem(SESSION_KEY); return false; }
    return s.v === '1';
  } catch { return false; }
}

function createSession() {
  const s = btoa(JSON.stringify({ v: '1', t: Date.now() }));
  sessionStorage.setItem(SESSION_KEY, s);
}

// ── 이미 로그인되어 있으면 바로 진입 ─────────────────────
if (checkSession()) {
  goToApp();
}

// ── 시도 횟수 관리 ────────────────────────────────────────
let attempts = parseInt(sessionStorage.getItem('_wv_attempts') || '0');
let lockedUntil = parseInt(sessionStorage.getItem('_wv_locked') || '0');

function isLocked() { return Date.now() < lockedUntil; }

function startLockout() {
  lockedUntil = Date.now() + LOCKOUT_SEC * 1000;
  sessionStorage.setItem('_wv_locked', lockedUntil);
  showLockout();
}

function showLockout() {
  const msg = document.getElementById('lockout-msg');
  const btn = document.getElementById('btn-login');
  msg.classList.add('show');
  btn.disabled = true;
  const tick = setInterval(function() {
    const left = Math.ceil((lockedUntil - Date.now()) / 1000);
    if (left <= 0) {
      clearInterval(tick);
      msg.classList.remove('show');
      btn.disabled = false;
      attempts = 0;
      sessionStorage.removeItem('_wv_attempts');
    } else {
      document.getElementById('lockout-sec').textContent = left;
    }
  }, 500);
}

// ── 로그인 처리 ───────────────────────────────────────────
async function doLogin() {
  if (isLocked()) return;

  const id = document.getElementById('inp-id').value.trim();
  const pw = document.getElementById('inp-pw').value;
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('error-msg');

  if (!id || !pw) {
    showError('아이디와 비밀번호를 입력해주세요');
    return;
  }

  // 로딩 상태
  btn.classList.add('loading');
  btn.disabled = true;
  err.classList.remove('show');

  // 의도적 딜레이 (타이밍 공격 방지)
  await new Promise(r => setTimeout(r, 600 + Math.random() * 400));

  try {
    const pwHash = await sha256(pw);
    const idOk   = id === CORRECT_ID;
    const pwOk   = pwHash === CORRECT_HASH;

    if (idOk && pwOk) {
      // 로그인 성공
      attempts = 0;
      sessionStorage.removeItem('_wv_attempts');
      sessionStorage.removeItem('_wv_locked');
      createSession();

      // 성공 애니메이션
      btn.classList.remove('loading');
      btn.style.background = '#0db972';
      btn.querySelector('.btn-text').style.display = 'block';
      btn.querySelector('.btn-text').textContent = '✓ 접속 중...';

      setTimeout(goToApp, 600);
    } else {
      // 실패
      attempts++;
      sessionStorage.setItem('_wv_attempts', attempts);
      btn.classList.remove('loading');
      btn.disabled = false;

      if (attempts >= MAX_ATTEMPTS) {
        startLockout();
        showError('로그인 시도 횟수를 초과했습니다. ' + LOCKOUT_SEC + '초 후 재시도하세요.');
      } else {
        showError('아이디 또는 비밀번호가 올바르지 않습니다 (' + (MAX_ATTEMPTS - attempts) + '회 남음)');
        // 비밀번호 필드 초기화
        document.getElementById('inp-pw').value = '';
        document.getElementById('inp-pw').focus();
      }
    }
  } catch(e) {
    btn.classList.remove('loading');
    btn.disabled = false;
    showError('오류가 발생했습니다. 다시 시도해주세요.');
  }
}

function showError(msg) {
  const err = document.getElementById('error-msg');
  err.textContent = msg;
  err.classList.remove('show');
  void err.offsetWidth;
  err.classList.add('show');
}

function goToApp() {
  window.location.replace('./app.html');
}

// ── Enter 키 ─────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

// ── URL 파라미터 차단 (펜트레이션 방지) ──────────────────
(function() {
  // advmap 공유 링크면 로그인 없이 바로 app.html로 이동
  var params = new URLSearchParams(window.location.search);
  if (params.get('advmap')) {
    window.location.replace('./app.html' + window.location.search);
    return;
  }
  // 다른 파라미터는 차단
  if (window.location.search || window.location.hash) {
    window.history.replaceState({}, '', window.location.pathname);
  }
})();

// ── 우클릭/개발자도구 힌트 방지 ──────────────────────────
document.addEventListener('contextmenu', e => e.preventDefault());

// ── 3D 배경 캔버스 ───────────────────────────────────────
(function() {
  const canvas = document.getElementById('canvas-bg');
  const ctx    = canvas.getContext('2d');

  let W, H, particles = [], lines = [];
  const PARTICLE_COUNT = 60;
  const ORANGE = [255, 107, 43];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  class Particle {
    constructor() { this.reset(true); }
    reset(initial) {
      this.x  = Math.random() * W;
      this.y  = initial ? Math.random() * H : H + 20;
      this.vx = (Math.random() - 0.5) * 0.4;
      this.vy = -Math.random() * 0.5 - 0.2;
      this.size = Math.random() * 1.5 + 0.5;
      this.alpha = Math.random() * 0.4 + 0.1;
      this.pulse = Math.random() * Math.PI * 2;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.pulse += 0.02;
      this.alpha = (Math.sin(this.pulse) * 0.15 + 0.2);
      if (this.y < -20) this.reset(false);
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${ORANGE.join(',')},${this.alpha})`;
      ctx.fill();
    }
  }

  function initParticles() {
    particles = Array.from({length: PARTICLE_COUNT}, () => new Particle());
  }

  // 회전하는 3D 격자
  let angle = 0;
  function drawGrid() {
    const cx = W / 2, cy = H / 2;
    const fov = 600;
    const gridSize = 12, spacing = 80;

    ctx.save();
    for (let i = -gridSize; i <= gridSize; i++) {
      for (let j = -gridSize; j <= gridSize; j++) {
        const x3 = i * spacing;
        const z3 = j * spacing - (Date.now() * 0.02 % spacing);
        const y3 = 120;
        const cosA = Math.cos(angle), sinA = Math.sin(angle);
        const rx = x3 * cosA - z3 * sinA;
        const rz = x3 * sinA + z3 * cosA;
        const scale = fov / (fov + rz + 400);
        if (scale < 0) continue;
        const sx = cx + rx * scale;
        const sy = cy + y3 * scale;
        const alpha = Math.min(0.12, scale * 0.1);
        ctx.beginPath();
        ctx.arc(sx, sy, scale * 1.2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${ORANGE.join(',')},${alpha})`;
        ctx.fill();
      }
    }
    ctx.restore();
    angle += 0.001;
  }

  // 연결선
  function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i+1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(${ORANGE.join(',')},${(1 - dist/120) * 0.08})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  function animate() {
    ctx.clearRect(0, 0, W, H);
    drawGrid();
    particles.forEach(p => { p.update(); p.draw(); });
    drawConnections();
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', () => { resize(); initParticles(); });
  resize();
  initParticles();
  animate();
})();
</script>
</body>
</html>
